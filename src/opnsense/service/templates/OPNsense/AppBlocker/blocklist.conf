{% if helpers.exists('OPNsense.appblocker.general.enabled') and OPNsense.appblocker.general.enabled == '1' %}
server:
{% if helpers.exists('OPNsense.appblocker.general.blocked_domains') %}
{%   for domain in OPNsense.appblocker.general.blocked_domains.split(',') %}
    local-zone: "{{ domain|trim }}" redirect
    local-data: "{{ domain|trim }} A 0.0.0.0"
    local-data: "{{ domain|trim }} AAAA ::"
{%   endfor %}
{% endif %}
{% if helpers.exists('OPNsense.appblocker.general.block_dns_bypass') and OPNsense.appblocker.general.block_dns_bypass == '1' %}
    # Block Common DoH/DoT Providers
    local-zone: "dns.google" redirect
    local-data: "dns.google A 0.0.0.0"
    local-zone: "cloudflare-dns.com" redirect
    local-data: "cloudflare-dns.com A 0.0.0.0"
    local-zone: "one.one.one.one" redirect
    local-data: "one.one.one.one A 0.0.0.0"
    local-zone: "dns.quad9.net" redirect
    local-data: "dns.quad9.net A 0.0.0.0"
    local-zone: "doh.pub" redirect
    local-data: "doh.pub A 0.0.0.0"
    local-zone: "dot.pub" redirect
    local-data: "dot.pub A 0.0.0.0"
    local-zone: "dns.adguard.com" redirect
    local-data: "dns.adguard.com A 0.0.0.0"
    # Block Cloudflare WARP / VPN Bootstrap
    local-zone: "engage.cloudflareclient.com" redirect
    local-data: "engage.cloudflareclient.com A 0.0.0.0"
    local-zone: "teams.cloudflare.com" redirect
    local-data: "teams.cloudflare.com A 0.0.0.0"
    local-zone: "install.cloudflare.com" redirect
    local-data: "install.cloudflare.com A 0.0.0.0"
{% endif %}
